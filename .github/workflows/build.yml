name: Compile Tulip Kernel

on:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tulip-kernel repository
        uses: actions/checkout@v2
        with:
          repository: 'l4feer/tulip-kernel'
          path: 'tulip-kernel'

      - name: Set up Android build environment
        run: |
          sudo apt update -y
          sudo apt install -y gcc-aarch64-linux-gnu build-essential git python3 bc bison flex curl libncurses-dev libssl-dev libelf-dev lib32ncurses-dev lib32readline-dev liblz4-tool g++-multilib gcc-multilib zlib1g-dev zip unzip -y

      - name: Compile kernel
        run: |
          cd tulip-kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export SUBARCH=arm64
          make tulip_defconfig
          make -j$(nproc)
